name: Deploy Angular to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'poc_captcha_front/**'
      - '.github/workflows/deploy-frontend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install & build
        working-directory: poc_captcha_front
        run: |
          npm install
          npx ng build --configuration production --base-href /poc_perval/
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: poc_captcha_front/dist/poc_captcha_front/browser
